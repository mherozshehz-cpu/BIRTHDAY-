<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday My Love ❤️</title>
<style>
body {
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  text-align: center;
  font-family: Arial;
  color: white;
  overflow: hidden;
}

h1 {
  margin-top: 100px;
  font-size: 40px;
}

.cake {
  font-size: 100px;
  animation: float 3s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0px); }
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: white;
  color: pink;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>HAPPY BIRTHDAY MY LOVEEEEEE 🎉</h1>

<div class="cake">🎂🕯️🕯️🕯️</div>

<p>Click below for a surprise 💖</p>

<button onclick="showMessage()">Open My Heart</button>

<p id="message" style="display:none; margin:40px; font-size:20px;">
You are the best thing that ever happened to me. I love you forever. 💞
</p>

<script>
function showMessage() {
  document.getElementById("message").style.display = "block";
}
</script>

</body>
</html>
